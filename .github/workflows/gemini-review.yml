name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # 댓글을 달아야 하므로 필수
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # 변경 내용을 읽기 위해 필요합니다.

      - name: Run Gemini CLI

        uses: google-github-actions/run-gemini-cli@v0.1.21
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: "gemini-1.5-flash"
          # 비서에게 줄 미션 (문서의 'prompt' 필드 사용)
          prompt: |
            당신은 시니어 백엔드 개발자입니다. 
            아래의 코드 변경 사항(git diff)을 보고 한국어로 코드 리뷰를 작성해주세요.
            보안 취약점이나 성능 개선이 필요한 부분을 콕 집어주세요.
            
            $(git diff HEAD^ HEAD)