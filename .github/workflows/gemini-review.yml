name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Gemini CLI
        uses: google-github-actions/run-gemini-cli@v0.1.21
        with:
          # 🚨 이름이 다 소문자이고 앞에 gemini_가 붙어야 합니다!
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: "gemini-1.5-flash"

          # 🚨 'custom_prompts'가 아니라 'prompt'입니다.
          # 여기에 마스터의 명령을 적으세요.
          prompt: "모든 코드 리뷰는 한국어로 진행해줘. 시니어 개발자처럼 친절하고 구체적인 개선 방향을 제시해줘."