name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # PR의 변경 내용을 가져오기 위해 필수입니다.
          fetch-depth: 2

      - name: Get PR Diff
        # 변경된 코드 내용을 텍스트 파일로 저장해서 비서에게 줄 준비를 합니다.
        run: git diff HEAD^ HEAD > pr_diff.txt

      - name: Run Gemini CLI
        uses: google-github-actions/run-gemini-cli@v0.1.21
        with:
          # 🚨 주의: 반드시 'gemini_'가 붙은 이름을 써야 합니다! (로그에서 확인했죠?)
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          # 🚨 모델명 뒤에 '-latest'를 붙이는 것이 2026년의 타당한 규칙입니다.
          gemini_model: "gemini-1.5-flash-latest"

          # 비서에게 '코드 파일'과 '명령'을 한꺼번에 전달합니다.
          prompt: |
            아래는 이번 PR에서 변경된 코드 파일들이다. 
            시니어 개발자 입장에서 한국어로 친절하고 예리하게 리뷰해줘.
            
            $(cat pr_diff.txt)