name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Gemini AI Code Reviewer
        # 👑 PR에 직접 댓글을 달아주는 '전용 리뷰어' 비서입니다.
        uses: truongnh1992/gemini-ai-code-reviewer@v9.2.1
        with:
          # 🚨 주의: 이 비서는 반드시 '대문자'로 적어줘야 알아듣습니다!
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # 🚨 모델 이름에서 '-latest'를 뺍니다. (404 에러 해결책)
          GEMINI_MODEL: "gemini-1.5-flash"